<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Apprendre Tout</title>
  <meta name="description" content="Connecte-toi à ton espace d'apprentissage." />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-container glass">
      <div class="auth-header">
        <div class="auth-brand">
          <span class="brand-icon">✦</span>
          <span>Apprendre Tout</span>
        </div>
        <h1>Bienvenue</h1>
        <p>Connecte-toi pour retrouver ton espace d'apprentissage.</p>
      </div>

      <form id="login-form" class="auth-form" autocomplete="off">
        <div class="form-group">
          <label for="login-email">Email</label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input 
              type="email" 
              id="login-email" 
              placeholder="ton@email.com" 
              required
              autocomplete="email"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="login-password">Mot de passe</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input 
              type="password" 
              id="login-password" 
              placeholder="••••••••" 
              required
              autocomplete="current-password"
              minlength="6"
            />
            <button type="button" class="password-toggle" aria-label="Afficher le mot de passe">
              👁️
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="remember-me" checked />
            <span>Se souvenir de moi</span>
          </label>
          <a href="#" id="forgot-password" class="forgot-link">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="button button-primary auth-submit">
          <span>Se connecter</span>
          <span class="button-icon">→</span>
        </button>

        <div id="login-message" class="auth-message"></div>

        <p class="auth-footer">
          Pas encore de compte ? 
          <a href="register.html" class="auth-link">Créer un compte</a>
        </p>
      </form>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Rediriger si déjà connecté
      if (Auth.isLoggedIn()) {
        window.location.href = 'dashboard.html';
        return;
      }

      const form = document.getElementById('login-form');
      const emailInput = document.getElementById('login-email');
      const passwordInput = document.getElementById('login-password');
      const messageEl = document.getElementById('login-message');

      // Toggle mot de passe
      const toggleBtn = document.querySelector('.password-toggle');
      toggleBtn.addEventListener('click', function() {
        const type = passwordInput.type === 'password' ? 'text' : 'password';
        passwordInput.type = type;
        this.textContent = type === 'password' ? '👁️' : '🙈';
      });

      // Soumission du formulaire
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        // Validation rapide
        if (!email || !password) {
          messageEl.textContent = 'Veuillez remplir tous les champs.';
          messageEl.className = 'auth-message error';
          return;
        }

        const result = Auth.login(email, password);

        if (result.success) {
          messageEl.textContent = '✅ ' + result.message;
          messageEl.className = 'auth-message success';
          
          // Rediriger vers le tableau de bord
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 800);
        } else {
          messageEl.textContent = '❌ ' + result.message;
          messageEl.className = 'auth-message error';
          passwordInput.value = '';
          passwordInput.focus();
        }
      });

      // Mot de passe oublié
      document.getElementById('forgot-password').addEventListener('click', function(e) {
        e.preventDefault();
        const email = emailInput.value.trim();
        if (!email) {
          messageEl.textContent = 'Veuillez entrer votre email pour réinitialiser.';
          messageEl.className = 'auth-message error';
          emailInput.focus();
          return;
        }

        const result = Auth.resetPassword(email);
        messageEl.textContent = result.success ? '📧 ' + result.message : '❌ ' + result.message;
        messageEl.className = 'auth-message ' + (result.success ? 'success' : 'error');
      });
    });
  </script>
</body>
</html>
