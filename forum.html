<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forum — Apprendre Tout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon">✦</span>
      <span>Apprendre Tout</span>
    </div>
    <div class="topbar-actions">
      <button class="theme-toggle" type="button" aria-label="Changer le thème">
        <span class="theme-icon">🌙</span>
      </button>
      <button class="menu-button" aria-expanded="false" aria-controls="main-menu" aria-label="Ouvrir le menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
    <nav class="menu" id="main-menu">
      <a href="index.html">Accueil</a>
      <a href="dashboard.html">Tableau de bord</a>
      <div class="menu-auth" id="menu-auth"></div>
    </nav>
  </header>

  <main>
    <section class="section forum">
      <div class="section-header">
        <span class="section-tag">💬 Communauté</span>
        <h2>Forum de discussion</h2>
        <p>Échange avec d'autres apprenants, pose des questions et partage tes connaissances.</p>
      </div>

      <div class="forum-container">
        <!-- Barre d'actions -->
        <div class="forum-actions">
          <div class="forum-filters">
            <select id="forum-filter" class="courses-filter" title="Filtrer les sujets du forum" aria-label="Filtrer les sujets du forum">
              <option value="all">Tous les sujets</option>
              <option value="hot">🔥 Populaires</option>
              <option value="solved">✅ Résolus</option>
              <option value="pinned">📌 Épinglés</option>
            </select>
            <input type="search" id="forum-search" class="courses-search" placeholder="Rechercher un sujet..." />
          </div>
          <button class="button button-primary" id="new-topic-btn">
            ✏️ Nouveau sujet
          </button>
        </div>

        <!-- Liste des sujets -->
        <div id="forum-topics">
          <!-- Généré par JS -->
        </div>

        <!-- Formulaire nouveau sujet (caché) -->
        <div id="new-topic-form" class="hidden-topic-form">
          <div class="glass topic-form-container">
            <h3 class="topic-form-title">✏️ Créer un nouveau sujet</h3>
            <form class="forum-form" id="topic-form">
              <input type="text" id="topic-title" placeholder="Titre du sujet" required />
              <select id="topic-category" required title="Choisir une catégorie" aria-label="Choisir une catégorie pour le sujet">
                <option value="">Choisir une catégorie</option>
                <option value="Informatique">💻 Informatique</option>
                <option value="Marketing">📈 Marketing</option>
                <option value="Design">🎨 Design</option>
                <option value="Business">🚀 Business</option>
                <option value="Santé">🏥 Santé</option>
                <option value="Autre">📌 Autre</option>
              </select>
              <textarea id="topic-content" placeholder="Décris ton sujet en détail..." rows="5" required></textarea>
              <div class="forum-form-actions">
                <button type="submit" class="button button-primary">📤 Publier</button>
                <button type="button" id="cancel-topic" class="button button-secondary">Annuler</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Vue d'un sujet (caché) -->
        <div id="topic-view" class="hidden-topic-view">
          <button id="back-to-topics" class="button button-secondary">← Retour aux sujets</button>
          <div id="topic-messages">
            <!-- Généré par JS -->
          </div>
          <div class="reply-section">
            <h4>💬 Répondre</h4>
            <form id="reply-form">
              <textarea id="reply-content" placeholder="Écris ta réponse..." rows="4"></textarea>
              <button type="submit" class="button button-primary">📤 Répondre</button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand">
        <span class="brand-icon">✦</span>
        <span>Apprendre Tout</span>
      </div>
      <p class="footer-copy">© <span id="year"></span> — Communauté d'apprentissage</p>
    </div>
  </footer>

  <script src="auth.js"></script>
  <script>
    // ==========================================
    // DONNÉES DU FORUM
    // ==========================================
    const FORUM_KEY = 'forum_topics';

    function getTopics() {
      try {
        const data = localStorage.getItem(FORUM_KEY);
        if (data) return JSON.parse(data);
      } catch (_) {}
      return [
        {
          id: 1,
          title: '🎯 Comment apprendre le JavaScript efficacement ?',
          category: 'Informatique',
          author: 'Alice',
          authorAvatar: '👩‍💻',
          date: new Date(Date.now() - 86400000 * 2).toISOString(),
          content: 'Bonjour tout le monde ! Je débute en JavaScript et je cherche des conseils pour progresser rapidement. Quelles sont vos meilleures astuces ?',
          replies: [
            {
              author: 'Bob',
              authorAvatar: '👨‍💻',
              date: new Date(Date.now() - 86400000).toISOString(),
              content: 'Je te conseille de commencer par des projets simples ! Crée une calculatrice, un jeu de devinette... La pratique est la clé.'
            },
            {
              author: 'Charlie',
              authorAvatar: '🧑‍💻',
              date: new Date(Date.now() - 3600000).toISOString(),
              content: 'Regarde les tutoriels de Mozilla Developer Network (MDN), c\'est une excellente ressource gratuite !'
            }
          ],
          pinned: false,
          solved: false,
          hot: true
        },
        {
          id: 2,
          title: '📊 Les bases du marketing digital en 2024',
          category: 'Marketing',
          author: 'Sophie',
          authorAvatar: '👩‍💼',
          date: new Date(Date.now() - 86400000 * 5).toISOString(),
          content: 'Je souhaite me lancer dans le marketing digital. Quelles sont les compétences essentielles à maîtriser aujourd\'hui ?',
          replies: [
            {
              author: 'David',
              authorAvatar: '👨‍💼',
              date: new Date(Date.now() - 86400000 * 3).toISOString(),
              content: 'SEO, SEA, Social Media, Email Marketing et Analytics sont les bases. Commence par un certificat Google Analytics !'
            }
          ],
          pinned: true,
          solved: false,
          hot: false
        },
        {
          id: 3,
          title: '✅ Problème de flexbox en CSS résolu !',
          category: 'Informatique',
          author: 'Emma',
          authorAvatar: '👩‍🎨',
          date: new Date(Date.now() - 86400000 * 1).toISOString(),
          content: 'Je galérais avec flexbox depuis des jours... J\'ai enfin compris ! Pour ceux qui ont le même problème, la propriété "flex: 1" est magique !',
          replies: [
            {
              author: 'Tom',
              authorAvatar: '👨‍🎨',
              date: new Date(Date.now() - 3600000 * 2).toISOString(),
              content: 'Merci pour l\'astuce ! Je vais tester ça tout de suite.'
            }
          ],
          pinned: false,
          solved: true,
          hot: false
        }
      ];
    }

    function saveTopics(topics) {
      try {
        localStorage.setItem(FORUM_KEY, JSON.stringify(topics));
      } catch (_) {}
    }

    let currentUser = null;
    let currentTopicId = null;

    function renderTopics(filter = 'all', search = '') {
      const container = document.getElementById('forum-topics');
      let topics = getTopics();

      if (filter === 'hot') topics = topics.filter(t => t.hot);
      else if (filter === 'solved') topics = topics.filter(t => t.solved);
      else if (filter === 'pinned') topics = topics.filter(t => t.pinned);

      if (search) {
        const s = search.toLowerCase();
        topics = topics.filter(t => 
          t.title.toLowerCase().includes(s) || 
          t.category.toLowerCase().includes(s) ||
          t.author.toLowerCase().includes(s) ||
          t.content.toLowerCase().includes(s)
        );
      }

      topics.sort((a, b) => {
        if (a.pinned && !b.pinned) return -1;
        if (!a.pinned && b.pinned) return 1;
        return new Date(b.date) - new Date(a.date);
      });

      if (topics.length === 0) {
        container.innerHTML = `
          <div class="glass empty-topics">
            <p class="empty-topics-icon">📭</p>
            <p class="empty-topics-text">Aucun sujet trouvé</p>
            <p class="empty-topics-sub">Sois le premier à créer un sujet !</p>
          </div>
        `;
        return;
      }

      container.innerHTML = topics.map(topic => `
        <div class="forum-topic glass" data-id="${topic.id}">
          <div class="forum-topic-header">
            <div>
              <span class="forum-topic-title">${topic.title}</span>
              <div class="forum-topic-tags">
                <span class="forum-topic-tag">${topic.category}</span>
                ${topic.pinned ? '<span class="forum-topic-tag pinned">📌 Épinglé</span>' : ''}
                ${topic.solved ? '<span class="forum-topic-tag solved">✅ Résolu</span>' : ''}
                ${topic.hot && !topic.solved ? '<span class="forum-topic-tag hot">🔥 Populaire</span>' : ''}
              </div>
            </div>
            <div class="forum-topic-stats">
              <span>💬 ${topic.replies.length}</span>
              <span>👤 ${topic.author}</span>
            </div>
          </div>
          <div class="forum-topic-meta">${new Date(topic.date).toLocaleDateString('fr-FR', {day:'numeric',month:'short',year:'numeric'})}</div>
        </div>
      `).join('');

      container.querySelectorAll('.forum-topic').forEach(el => {
        el.addEventListener('click', function() {
          const id = parseInt(this.dataset.id);
          showTopic(id);
        });
      });
    }

    function showTopic(id) {
      const topics = getTopics();
      const topic = topics.find(t => t.id === id);
      if (!topic) return;

      currentTopicId = id;

      document.getElementById('forum-topics').style.display = 'none';
      document.getElementById('new-topic-form').style.display = 'none';
      document.getElementById('topic-view').style.display = 'block';

      const container = document.getElementById('topic-messages');
      container.innerHTML = `
        <div class="glass topic-detail-container">
          <h3 class="topic-detail-title">${topic.title}</h3>
          <div class="topic-meta">
            <span>👤 ${topic.author}</span>
            <span>📅 ${new Date(topic.date).toLocaleDateString('fr-FR', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
            <span class="forum-topic-tag">${topic.category}</span>
          </div>
          <p class="topic-detail-content">${topic.content}</p>
        </div>
        ${topic.replies.map(reply => `
          <div class="forum-message">
            <div class="forum-message-author">
              <span class="forum-message-author-avatar">${reply.authorAvatar || '👤'}</span>
              <span class="forum-message-author-name">${reply.author}</span>
              <span class="forum-message-author-date">${new Date(reply.date).toLocaleDateString('fr-FR', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
            </div>
            <div class="forum-message-content">${reply.content}</div>
          </div>
        `).join('')}
      `;
    }

    function initForum() {
      if (typeof Auth !== 'undefined') {
        currentUser = Auth.getCurrentUser();
        const menuAuth = document.getElementById('menu-auth');
        if (menuAuth) {
          if (currentUser) {
            menuAuth.innerHTML = `
              <span class="auth-user">
                <span class="auth-user-avatar">${currentUser.avatar || '😊'}</span>
                <span>${currentUser.username}</span>
              </span>
              <button class="auth-btn auth-btn-logout" id="forum-logout-btn">🚪 Déconnexion</button>
            `;
            document.getElementById('forum-logout-btn')?.addEventListener('click', function() {
              if (Auth && Auth.logout) Auth.logout();
            });
          } else {
            menuAuth.innerHTML = `
              <a href="login.html" class="auth-btn auth-btn-login">🔑 Connexion</a>
              <a href="register.html" class="auth-btn auth-btn-register">✨ S'inscrire</a>
            `;
          }
        }
      }

      renderTopics();

      document.getElementById('forum-filter')?.addEventListener('change', function() {
        renderTopics(this.value, document.getElementById('forum-search').value);
      });
      document.getElementById('forum-search')?.addEventListener('input', function() {
        renderTopics(document.getElementById('forum-filter').value, this.value);
      });

      document.getElementById('new-topic-btn')?.addEventListener('click', function() {
        if (!currentUser) {
          alert('🔐 Connecte-toi pour créer un sujet !');
          return;
        }
        const form = document.getElementById('new-topic-form');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
        document.getElementById('topic-view').style.display = 'none';
        document.getElementById('forum-topics').style.display = 'block';
      });

      document.getElementById('cancel-topic')?.addEventListener('click', function() {
        document.getElementById('new-topic-form').style.display = 'none';
      });

      document.getElementById('topic-form')?.addEventListener('submit', function(e) {
        e.preventDefault();
        if (!currentUser) {
          alert('🔐 Connecte-toi pour créer un sujet !');
          return;
        }

        const title = document.getElementById('topic-title').value.trim();
        const category = document.getElementById('topic-category').value;
        const content = document.getElementById('topic-content').value.trim();

        if (!title || !category || !content) {
          alert('Veuillez remplir tous les champs.');
          return;
        }

        const topics = getTopics();
        const newTopic = {
          id: Date.now(),
          title,
          category,
          author: currentUser.username,
          authorAvatar: currentUser.avatar || '👤',
          date: new Date().toISOString(),
          content,
          replies: [],
          pinned: false,
          solved: false,
          hot: false
        };
        topics.unshift(newTopic);
        saveTopics(topics);
        renderTopics();
        document.getElementById('new-topic-form').style.display = 'none';
        this.reset();
        alert('✅ Sujet créé avec succès !');
      });

      document.getElementById('reply-form')?.addEventListener('submit', function(e) {
        e.preventDefault();
        if (!currentUser) {
          alert('🔐 Connecte-toi pour répondre !');
          return;
        }
        const content = document.getElementById('reply-content').value.trim();
        if (!content) {
          alert('Veuillez écrire une réponse.');
          return;
        }

        const topics = getTopics();
        const topic = topics.find(t => t.id === currentTopicId);
        if (topic) {
          topic.replies.push({
            author: currentUser.username,
            authorAvatar: currentUser.avatar || '👤',
            date: new Date().toISOString(),
            content
          });
          saveTopics(topics);
          showTopic(currentTopicId);
          document.getElementById('reply-content').value = '';
        }
      });

      document.getElementById('back-to-topics')?.addEventListener('click', function() {
        document.getElementById('topic-view').style.display = 'none';
        document.getElementById('forum-topics').style.display = 'block';
        renderTopics();
      });

      document.getElementById('year').textContent = new Date().getFullYear();
    }

    document.addEventListener('DOMContentLoaded', initForum);
  </script>
</body>
</html>
