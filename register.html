<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription — Apprendre Tout</title>
  <meta name="description" content="Crée ton compte et commence à apprendre." />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-container glass">
      <div class="auth-header">
        <div class="auth-brand">
          <span class="brand-icon">✦</span>
          <span>Apprendre Tout</span>
        </div>
        <h1>Créer un compte</h1>
        <p>Rejoins la communauté et commence ton apprentissage.</p>
      </div>

      <form id="register-form" class="auth-form" autocomplete="off">
        <div class="form-group">
          <label for="register-username">Nom d'utilisateur</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input 
              type="text" 
              id="register-username" 
              placeholder="Jean Dupont" 
              required
              autocomplete="username"
              minlength="2"
              maxlength="30"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="register-email">Email</label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input 
              type="email" 
              id="register-email" 
              placeholder="ton@email.com" 
              required
              autocomplete="email"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="register-password">Mot de passe</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input 
              type="password" 
              id="register-password" 
              placeholder="••••••••" 
              required
              autocomplete="new-password"
              minlength="6"
            />
            <button type="button" class="password-toggle" aria-label="Afficher le mot de passe">
              👁️
            </button>
          </div>
          <p class="password-hint">Minimum 6 caractères</p>
        </div>

        <div class="form-group">
          <label for="register-confirm">Confirmer le mot de passe</label>
          <div class="input-wrapper">
            <span class="input-icon">✅</span>
            <input 
              type="password" 
              id="register-confirm" 
              placeholder="••••••••" 
              required
              autocomplete="new-password"
              minlength="6"
            />
          </div>
        </div>

        <div class="form-group terms">
          <label class="terms-label">
            <input type="checkbox" id="terms-checkbox" required />
            <span>
              J'accepte les 
              <a href="#" id="terms-link">conditions d'utilisation</a> 
              et la 
              <a href="#" id="privacy-link">politique de confidentialité</a>
            </span>
          </label>
        </div>

        <button type="submit" class="button button-primary auth-submit">
          <span>S'inscrire</span>
          <span class="button-icon">✨</span>
        </button>

        <div id="register-message" class="auth-message"></div>

        <p class="auth-footer">
          Déjà un compte ? 
          <a href="login.html" class="auth-link">Se connecter</a>
        </p>
      </form>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Rediriger si déjà connecté
      if (Auth.isLoggedIn()) {
        window.location.href = 'dashboard.html';
        return;
      }

      const form = document.getElementById('register-form');
      const usernameInput = document.getElementById('register-username');
      const emailInput = document.getElementById('register-email');
      const passwordInput = document.getElementById('register-password');
      const confirmInput = document.getElementById('register-confirm');
      const messageEl = document.getElementById('register-message');

      // Toggle mot de passe
      document.querySelectorAll('.password-toggle').forEach(btn => {
        btn.addEventListener('click', function() {
          const input = this.closest('.input-wrapper').querySelector('input');
          const type = input.type === 'password' ? 'text' : 'password';
          input.type = type;
          this.textContent = type === 'password' ? '👁️' : '🙈';
        });
      });

      // Validation en temps réel du mot de passe
      passwordInput.addEventListener('input', function() {
        const strength = this.value.length;
        const hint = this.closest('.form-group').querySelector('.password-hint');
        if (strength === 0) {
          hint.textContent = 'Minimum 6 caractères';
          hint.className = 'password-hint';
        } else if (strength < 6) {
          hint.textContent = `⚠️ ${strength}/6 caractères`;
          hint.className = 'password-hint weak';
        } else {
          hint.textContent = `✅ ${strength} caractères`;
          hint.className = 'password-hint strong';
        }
      });

      // Vérification de la confirmation
      confirmInput.addEventListener('input', function() {
        if (this.value.length > 0 && this.value !== passwordInput.value) {
          this.style.borderColor = '#FF6B8A';
        } else {
          this.style.borderColor = '';
        }
      });

      // Soumission du formulaire
      form.addEventListener('submit', function(e) {
        e.preventDefault();

        const username = usernameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const confirm = confirmInput.value;

        // Validations
        if (!username || !email || !password || !confirm) {
          messageEl.textContent = 'Veuillez remplir tous les champs.';
          messageEl.className = 'auth-message error';
          return;
        }

        if (password !== confirm) {
          messageEl.textContent = 'Les mots de passe ne correspondent pas.';
          messageEl.className = 'auth-message error';
          confirmInput.focus();
          return;
        }

        if (!document.getElementById('terms-checkbox').checked) {
          messageEl.textContent = 'Veuillez accepter les conditions d\'utilisation.';
          messageEl.className = 'auth-message error';
          return;
        }

        const result = Auth.register(username, email, password);

        if (result.success) {
          messageEl.textContent = '🎉 ' + result.message;
          messageEl.className = 'auth-message success';
          
          // Rediriger vers le tableau de bord
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1000);
        } else {
          messageEl.textContent = '❌ ' + result.message;
          messageEl.className = 'auth-message error';
        }
      });

      // Lien conditions
      document.getElementById('terms-link').addEventListener('click', function(e) {
        e.preventDefault();
        alert('📜 Conditions d\'utilisation :\n\n1. Utilise ce site pour apprendre\n2. Sois respectueux envers les autres\n3. Amuse-toi bien !');
      });

      document.getElementById('privacy-link').addEventListener('click', function(e) {
        e.preventDefault();
        alert('🔒 Politique de confidentialité :\n\nTes données sont stockées localement dans ton navigateur.\nAucune donnée n\'est envoyée sur un serveur externe.');
      });
    });
  </script>
</body>
</html>
